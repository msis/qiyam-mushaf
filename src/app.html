<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://qiyam-mushaf.com/" />

    <!-- Core meta -->
    <meta name="application-name" content="Qiyam Mushaf" />
    <meta
      name="description"
      content="Read the Mushaf with speech-recognition highlighting during your qiyam prayers. A simple, distraction-free Quran reader."
    />
    <meta name="theme-color" content="#d97706" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Qiyam Mushaf" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Qiyam Mushaf" />
    <meta property="og:url" content="https://qiyam-mushaf.com/" />
    <meta property="og:title" content="Qiyam Mushaf" />
    <meta
      property="og:description"
      content="Read the Mushaf with speech-recognition highlighting during your qiyam prayers. A simple, distraction-free Quran reader."
    />
    <meta
      property="og:image"
      content="https://qiyam-mushaf.com/icons/icon-512.png"
    />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Qiyam Mushaf" />
    <meta
      name="twitter:description"
      content="Read the Mushaf with speech-recognition highlighting during your qiyam prayers. A simple, distraction-free Quran reader."
    />
    <meta
      name="twitter:image"
      content="https://qiyam-mushaf.com/icons/icon-512.png"
    />

    <!-- PWA resources -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="48x48" />
    <link rel="mask-icon" href="/icons/logo-mask.svg" color="#d97706" />
    <link rel="shortcut icon" href="/favicon.ico" />

    %sveltekit.head%

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Qiyam Mushaf",
        "url": "https://qiyam-mushaf.com/",
        "description": "Read the Mushaf with speech-recognition highlighting during your qiyam prayers. A simple, distraction-free Quran reader.",
        "applicationCategory": "ReligionApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern browser with Web Speech API support",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "inLanguage": [
          "ar",
          "en",
          "fr",
          "es",
          "id",
          "tr",
          "ur",
          "ms",
          "bn",
          "so"
        ],
        "image": "https://qiyam-mushaf.com/icons/icon-512.png",
        "featureList": [
          "Real-time speech-recognition Quran highlighting",
          "Full Mushaf with Uthmani script",
          "Bookmark verses",
          "Continue where you left off",
          "Offline access via PWA",
          "10 UI language translations"
        ]
      }
    </script>
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-gray-900">
    <script>
      // Pre-hydration: apply saved locale before framework boots to avoid flash
      (function () {
        var rtlLocales = { ar: true, ur: true };
        var locale = localStorage.getItem("locale") || "en";
        document.documentElement.lang = locale;
        document.documentElement.dir = rtlLocales[locale] ? "rtl" : "ltr";
      })();
      window.__pwaInstallPrompt = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
