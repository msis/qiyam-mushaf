<!DOCTYPE html>
<html lang="ar" dir="rtl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<meta name="application-name" content="Qiyam Mushaf" />
		<meta name="theme-color" content="#d97706" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="description" content="Read the Mushaf with speech-recognition highlighting during your Qiyam" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-gray-900">
		<script>
			window.__pwaInstallPrompt = null;
			window.addEventListener('beforeinstallprompt', function (e) {
				e.preventDefault();
				window.__pwaInstallPrompt = e;
			});
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
