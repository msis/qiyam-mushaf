<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- Primary Meta Tags -->
    <meta name="application-name" content="Qiyam Mushaf" />
    <meta name="theme-color" content="#d97706" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Read the Quran with real-time speech recognition highlighting during your qiyam prayers. A distraction-free digital Mushaf that follows along as you recite."
    />
    <meta name="keywords" content="Quran, Mushaf, qiyam, speech recognition, Quran reader, recitation, taraweeh, Islamic app, القرآن, مصحف, قيام الليل" />
    <meta name="author" content="Qiyam Mushaf" />
    <link rel="canonical" href="https://qiyam-mushaf.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qiyam-mushaf.com/" />
    <meta property="og:title" content="Qiyam Mushaf - Quran Reader with Speech Recognition" />
    <meta property="og:description" content="Read the Quran with real-time speech recognition highlighting during your qiyam prayers. A distraction-free digital Mushaf that follows along as you recite." />
    <meta property="og:image" content="https://qiyam-mushaf.com/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="Qiyam Mushaf" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Qiyam Mushaf - Quran Reader with Speech Recognition" />
    <meta name="twitter:description" content="Read the Quran with real-time speech recognition highlighting during your qiyam prayers. A distraction-free digital Mushaf that follows along as you recite." />
    <meta name="twitter:image" content="https://qiyam-mushaf.com/icons/icon-512.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Qiyam Mushaf",
        "url": "https://qiyam-mushaf.com/",
        "description": "Read the Quran with real-time speech recognition highlighting during your qiyam prayers. A distraction-free digital Mushaf that follows along as you recite.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern browser with Web Speech API support",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Real-time speech recognition for Quran recitation",
          "Automatic word-by-word highlighting",
          "Auto-advance through verses",
          "Distraction-free reading interface",
          "Works offline as a Progressive Web App",
          "Uthmani script display"
        ],
        "inLanguage": ["ar", "en"],
        "screenshot": "https://qiyam-mushaf.com/icons/icon-512.png",
        "softwareVersion": "1.0",
        "author": {
          "@type": "Organization",
          "name": "Qiyam Mushaf"
        }
      }
    </script>

    <!-- Favicons & App Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="48x48" />
    <link rel="mask-icon" href="/icons/logo-mask.svg" color="#d97706" />
    <link rel="shortcut icon" href="/favicon.ico" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-gray-900">
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
